<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Study Quiz</title>

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Study">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F4EFE6">
<meta name="format-detection" content="telephone=no">

<!-- Icons: apple-touch-icon is injected by JS from base64 (single-file) -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%231F4743'/><text x='50' y='70' text-anchor='middle' font-family='Georgia,serif' font-weight='700' font-size='64' fill='%23F4EFE6'>Q</text><circle cx='72' cy='66' r='5' fill='%23C46C56'/></svg>">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..700,0..100&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  /* ═══════════════════════════════════════════════════════════════════
     DESIGN TOKENS
     ═══════════════════════════════════════════════════════════════════ */
  :root {
    /* Paper-like warm palette */
    --bg:          #F4EFE6;
    --bg-raised:   #FBF7EF;
    --bg-sunken:   #ECE5D5;
    --ink:         #1A1815;
    --ink-2:       #433F38;
    --ink-3:       #7A7266;
    --line:        #D6CCB7;
    --line-2:      #E6DDC9;

    /* Clinical-but-warm accent */
    --accent:      #1F4743;
    --accent-2:    #2E615B;
    --accent-ink:  #F4EFE6;

    /* Feedback */
    --ok:          #4F6540;
    --ok-bg:       #E4E9D7;
    --ok-line:     #BFCBAB;
    --no:          #A85A3D;
    --no-bg:       #F2E1D6;
    --no-line:     #D9B39F;

    /* Typography */
    --f-display: 'Fraunces', ui-serif, Georgia, 'Times New Roman', serif;
    --f-ui:      'Instrument Sans', ui-sans-serif, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --f-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

    /* Shape */
    --r-sm:   8px;
    --r:     12px;
    --r-lg:  18px;
    --r-pill: 999px;

    /* Shadow (very subtle, paper-like) */
    --shadow-1: 0 1px 0 rgba(26,24,21,0.03), 0 1px 2px rgba(26,24,21,0.04);
    --shadow-2: 0 2px 0 rgba(26,24,21,0.04), 0 6px 14px -6px rgba(26,24,21,0.08);

    /* Max line */
    --col:   min(100% - 32px, 620px);

    /* Safe areas */
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
  }

  /* ═══════════════════════════════════════════════════════════════════
     RESET / BASE
     ═══════════════════════════════════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--f-ui);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    overscroll-behavior-y: none;
    /* Subtle paper grain */
    background-image:
      radial-gradient(1200px 600px at 50% -200px, rgba(31,71,67,0.05), transparent 60%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.10 0 0 0 0 0.09 0 0 0 0 0.08 0 0 0 0.04 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
    background-attachment: fixed;
    min-height: 100vh;
    min-height: 100dvh;
  }

  button { font: inherit; color: inherit; cursor: pointer; border: 0; background: none; }
  input, textarea, select { font: inherit; color: inherit; }
  textarea { resize: vertical; }
  a { color: var(--accent); }

  ::selection { background: var(--accent); color: var(--accent-ink); }

  /* ═══════════════════════════════════════════════════════════════════
     LAYOUT
     ═══════════════════════════════════════════════════════════════════ */
  #app {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding-top: calc(var(--sat) + 20px);
    padding-bottom: calc(var(--sab) + 32px);
  }

  .wrap {
    width: var(--col);
    margin: 0 auto;
  }

  .view {
    width: 100%;
    animation: viewIn .36s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes viewIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ═══════════════════════════════════════════════════════════════════
     HEADER (small site-wide bar)
     ═══════════════════════════════════════════════════════════════════ */
  .topbar {
    width: var(--col);
    margin: 0 auto 28px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }
  .brand {
    font-family: var(--f-display);
    font-size: 17px;
    font-weight: 500;
    font-variation-settings: "opsz" 14, "SOFT" 30;
    letter-spacing: -0.01em;
    color: var(--ink);
    text-decoration: none;
    display: inline-flex;
    align-items: baseline;
  }
  .brand::before {
    content: "";
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 999px;
    background: var(--accent);
    transform: translateY(-1px);
    margin-right: 7px;
    flex-shrink: 0;
  }
  .brand .dot {
    color: var(--no);
  }
  .topbar .meta {
    font-family: var(--f-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--ink-3);
    text-transform: uppercase;
  }

  /* ═══════════════════════════════════════════════════════════════════
     TYPOGRAPHY UTILS
     ═══════════════════════════════════════════════════════════════════ */
  .eyebrow {
    font-family: var(--f-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .eyebrow.muted { color: var(--ink-3); }

  h1, h2, h3 { margin: 0; }

  .display {
    font-family: var(--f-display);
    font-variation-settings: "opsz" 144, "SOFT" 50, "wght" 460;
    font-weight: 460;
    letter-spacing: -0.02em;
    line-height: 1.05;
  }
  h1.display { font-size: clamp(36px, 8vw, 56px); }
  h2.display { font-size: clamp(28px, 6vw, 40px); }

  .q-text {
    font-family: var(--f-display);
    font-variation-settings: "opsz" 72, "SOFT" 40, "wght" 420;
    font-size: clamp(22px, 5.3vw, 28px);
    line-height: 1.25;
    letter-spacing: -0.012em;
    color: var(--ink);
  }

  .lede {
    font-family: var(--f-display);
    font-variation-settings: "opsz" 36, "SOFT" 60, "wght" 380;
    font-size: 18px;
    line-height: 1.5;
    color: var(--ink-2);
  }

  .mono { font-family: var(--f-mono); }

  /* ═══════════════════════════════════════════════════════════════════
     BUTTONS
     ═══════════════════════════════════════════════════════════════════ */
  .btn {
    font-family: var(--f-ui);
    font-weight: 500;
    font-size: 15px;
    letter-spacing: -0.005em;
    padding: 14px 20px;
    border-radius: var(--r);
    background: var(--accent);
    color: var(--accent-ink);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 48px;
    -webkit-tap-highlight-color: transparent;
    transition: transform .1s ease, background .15s ease, box-shadow .2s;
    box-shadow: var(--shadow-1);
  }
  .btn:active { transform: scale(0.985); }
  .btn:hover { background: var(--accent-2); }
  .btn:disabled,
  .btn[disabled] {
    background: var(--bg-sunken);
    color: var(--ink-3);
    cursor: not-allowed;
    box-shadow: none;
  }
  .btn:disabled:hover,
  .btn[disabled]:hover { background: var(--bg-sunken); }
  .btn.block { width: 100%; }
  .btn.lg { padding: 16px 22px; min-height: 54px; font-size: 16px; }
  .btn.ghost {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--line);
    box-shadow: none;
  }
  .btn.ghost:hover { background: var(--bg-sunken); border-color: var(--line); }
  .btn.quiet {
    background: transparent;
    color: var(--ink-2);
    min-height: 40px;
    padding: 8px 12px;
  }
  .btn.quiet:hover { background: var(--bg-sunken); }

  /* arrow glyph */
  .arrow { display: inline-block; transform: translateY(-0.5px); }

  /* ═══════════════════════════════════════════════════════════════════
     CARDS / PANELS
     ═══════════════════════════════════════════════════════════════════ */
  .card {
    background: var(--bg-raised);
    border: 1px solid var(--line-2);
    border-radius: var(--r-lg);
    padding: 22px;
    box-shadow: var(--shadow-1);
  }
  .card + .card { margin-top: 14px; }

  .stack > * + * { margin-top: 14px; }
  .stack-lg > * + * { margin-top: 22px; }
  .stack-sm > * + * { margin-top: 8px; }

  hr.rule {
    border: 0;
    border-top: 1px solid var(--line-2);
    margin: 24px 0;
  }

  /* ═══════════════════════════════════════════════════════════════════
     FORM INPUTS
     ═══════════════════════════════════════════════════════════════════ */
  label.field {
    display: block;
    font-family: var(--f-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 6px;
  }
  .input, .textarea {
    width: 100%;
    display: block;
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--r);
    font-family: var(--f-ui);
    font-size: 15px;
    color: var(--ink);
    transition: border-color .15s, background .15s;
  }
  .input:focus, .textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--bg-raised);
  }
  .textarea {
    min-height: 180px;
    font-family: var(--f-mono);
    font-size: 12.5px;
    line-height: 1.55;
  }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }

  /* ═══════════════════════════════════════════════════════════════════
     HOME VIEW
     ═══════════════════════════════════════════════════════════════════ */
  .home-hero {
    padding: 8px 0 24px;
  }
  .home-hero h1 {
    margin-top: 8px;
  }
  .home-hero .dot-end { color: var(--no); }
  .home-hero p.lede {
    margin-top: 14px;
    max-width: 28em;
  }

  .actions { margin-top: 24px; display: flex; flex-direction: column; gap: 10px; }

  .tile {
    display: block;
    text-decoration: none;
    background: var(--bg-raised);
    border: 1px solid var(--line-2);
    border-radius: var(--r-lg);
    padding: 18px 20px;
    color: var(--ink);
    transition: transform .15s, border-color .15s, background .15s;
  }
  .tile:hover { border-color: var(--line); background: #FEFBF4; }
  .tile:active { transform: scale(0.995); }
  .tile .tile-title {
    font-family: var(--f-display);
    font-variation-settings: "opsz" 36, "SOFT" 40, "wght" 480;
    font-size: 20px;
    line-height: 1.1;
    letter-spacing: -0.01em;
  }
  .tile .tile-desc {
    font-size: 14px;
    color: var(--ink-2);
    margin-top: 4px;
  }
  .tile .tile-arrow {
    float: right;
    color: var(--accent);
    font-family: var(--f-display);
    font-size: 22px;
    line-height: 1;
  }

  /* ═══════════════════════════════════════════════════════════════════
     QUIZ INTRO
     ═══════════════════════════════════════════════════════════════════ */
  .intro-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--f-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 14px;
  }
  .intro-meta .sep { opacity: 0.4; }
  .intro-meta .pill {
    background: var(--accent);
    color: var(--accent-ink);
    padding: 3px 8px;
    border-radius: var(--r-pill);
    letter-spacing: 0.1em;
  }

  .intro-stats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-top: 22px;
  }
  .stat {
    background: var(--bg-raised);
    border: 1px solid var(--line-2);
    border-radius: var(--r);
    padding: 14px 16px;
  }
  .stat .stat-k {
    font-family: var(--f-mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 4px;
  }
  .stat .stat-v {
    font-family: var(--f-display);
    font-variation-settings: "opsz" 72, "SOFT" 50, "wght" 500;
    font-size: 28px;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .stat .stat-v small {
    font-size: 16px;
    color: var(--ink-3);
    font-variation-settings: "opsz" 36, "SOFT" 50, "wght" 400;
  }

  .topics-list {
    margin-top: 18px;
  }
  .topics-list .topic-chip {
    display: inline-block;
    font-family: var(--f-mono);
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 4px 10px;
    background: var(--bg-sunken);
    border: 1px solid var(--line-2);
    color: var(--ink-2);
    border-radius: var(--r-pill);
    margin: 0 4px 6px 0;
  }

  /* ═══════════════════════════════════════════════════════════════════
     QUIZ QUESTION
     ═══════════════════════════════════════════════════════════════════ */
  .qhead {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 18px;
  }
  .qhead .counter {
    font-family: var(--f-mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--ink-3);
  }
  .qhead .counter b {
    color: var(--ink);
    font-weight: 500;
  }
  .qhead .topic {
    font-family: var(--f-mono);
    font-size: 10.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    text-align: right;
    max-width: 60%;
  }

  /* progress indicator — a row of marks */
  .progress {
    display: flex;
    gap: 4px;
    margin-bottom: 22px;
  }
  .progress .mark {
    flex: 1;
    height: 3px;
    background: var(--line-2);
    border-radius: 999px;
    overflow: hidden;
    transition: background .2s;
  }
  .progress .mark.done { background: var(--accent); }
  .progress .mark.current { background: var(--accent); opacity: 0.4; }
  .progress .mark.correct { background: var(--ok); }
  .progress .mark.incorrect { background: var(--no); }

  .question {
    margin: 10px 0 24px;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .choice {
    text-align: left;
    padding: 14px 16px 14px 52px;
    background: var(--bg-raised);
    border: 1px solid var(--line-2);
    border-radius: var(--r);
    font-family: var(--f-ui);
    font-size: 15.5px;
    line-height: 1.4;
    color: var(--ink);
    position: relative;
    transition: border-color .15s, background .15s, transform .1s, padding .15s;
    -webkit-tap-highlight-color: transparent;
  }
  /* Reserve space for the ✓/✗ mark only after the answer is locked */
  .choice.correct,
  .choice.incorrect {
    padding-right: 42px;
  }
  .choice::before {
    content: attr(data-letter);
    position: absolute;
    left: 14px;
    top: 14px;
    width: 26px;
    height: 26px;
    border: 1px solid var(--line);
    border-radius: 999px;
    font-family: var(--f-mono);
    font-size: 12px;
    color: var(--ink-2);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }
  .choice:hover { border-color: var(--line); background: #FEFBF4; }
  .choice:active { transform: scale(0.995); }

  .choice.selected {
    border-color: var(--accent);
    background: #F1F4F2;
  }
  .choice.selected::before {
    background: var(--accent);
    color: var(--accent-ink);
    border-color: var(--accent);
  }
  .choice.correct {
    border-color: var(--ok-line);
    background: var(--ok-bg);
  }
  .choice.correct::before {
    background: var(--ok);
    color: white;
    border-color: var(--ok);
  }
  .choice.incorrect {
    border-color: var(--no-line);
    background: var(--no-bg);
  }
  .choice.incorrect::before {
    background: var(--no);
    color: white;
    border-color: var(--no);
  }
  .choice.disabled { pointer-events: none; }

  .choice .tick {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--f-display);
    font-size: 16px;
    opacity: 0;
    transition: opacity .15s;
  }
  .choice.correct .tick { opacity: 1; color: var(--ok); }
  .choice.incorrect .tick { opacity: 1; color: var(--no); }

  .feedback-bar {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: var(--r);
    border: 1px solid var(--line-2);
    font-size: 14.5px;
    line-height: 1.45;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .feedback-bar.ok { background: var(--ok-bg); border-color: var(--ok-line); color: #2F3D25; }
  .feedback-bar.no { background: var(--no-bg); border-color: var(--no-line); color: #67361F; }
  .feedback-bar b {
    font-family: var(--f-display);
    font-variation-settings: "opsz" 24, "SOFT" 50, "wght" 520;
    font-weight: 520;
  }

  .qactions {
    margin-top: 20px;
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }

  /* ═══════════════════════════════════════════════════════════════════
     RESULTS VIEW
     ═══════════════════════════════════════════════════════════════════ */
  .result-hero {
    text-align: left;
    padding: 12px 0 6px;
  }
  .score-big {
    font-family: var(--f-display);
    font-variation-settings: "opsz" 144, "SOFT" 40, "wght" 420;
    font-size: clamp(72px, 18vw, 112px);
    line-height: 0.9;
    letter-spacing: -0.04em;
    color: var(--ink);
  }
  .score-big .over {
    color: var(--ink-3);
    font-variation-settings: "opsz" 72, "SOFT" 40, "wght" 360;
  }
  .score-pct {
    font-family: var(--f-mono);
    font-size: 13px;
    letter-spacing: 0.1em;
    color: var(--ink-3);
    text-transform: uppercase;
    margin-top: 4px;
  }

  .topic-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .topic-row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--line-2);
  }
  .topic-row:last-child { border-bottom: 0; }
  .topic-row .t-name {
    font-family: var(--f-display);
    font-variation-settings: "opsz" 36, "SOFT" 40, "wght" 460;
    font-size: 16px;
    color: var(--ink);
  }
  .topic-row .t-bar {
    height: 6px;
    border-radius: 999px;
    background: var(--bg-sunken);
    margin-top: 6px;
    overflow: hidden;
    max-width: 240px;
  }
  .topic-row .t-bar > i {
    display: block;
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
  }
  .topic-row.low .t-bar > i { background: var(--no); }
  .topic-row.mid .t-bar > i { background: #B78A3D; }
  .topic-row .t-score {
    font-family: var(--f-mono);
    font-size: 13px;
    color: var(--ink-2);
    white-space: nowrap;
  }

  .review-item {
    padding: 14px 0;
    border-bottom: 1px solid var(--line-2);
  }
  .review-item:last-child { border-bottom: 0; }
  .review-item .ri-q {
    font-family: var(--f-display);
    font-variation-settings: "opsz" 36, "SOFT" 40, "wght" 440;
    font-size: 16px;
    line-height: 1.35;
    color: var(--ink);
  }
  .review-item .ri-meta {
    margin-top: 6px;
    font-size: 13px;
    color: var(--ink-2);
  }
  .review-item .ri-meta .chosen { color: var(--no); }
  .review-item .ri-meta .chosen.ok { color: var(--ok); }
  .review-item .ri-topic {
    font-family: var(--f-mono);
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 4px;
  }

  /* ═══════════════════════════════════════════════════════════════════
     DASHBOARD VIEW
     ═══════════════════════════════════════════════════════════════════ */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .kpi {
    background: var(--bg-raised);
    border: 1px solid var(--line-2);
    border-radius: var(--r);
    padding: 12px 14px;
  }
  .kpi .kpi-k {
    font-family: var(--f-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .kpi .kpi-v {
    font-family: var(--f-display);
    font-variation-settings: "opsz" 48, "SOFT" 50, "wght" 460;
    font-size: 24px;
    line-height: 1.1;
    margin-top: 4px;
  }

  .chart-wrap {
    background: var(--bg-raised);
    border: 1px solid var(--line-2);
    border-radius: var(--r-lg);
    padding: 20px 16px 12px;
  }
  .chart-title {
    font-family: var(--f-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 12px;
  }

  .week-list {
    display: flex;
    flex-direction: column;
  }
  .week-item {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--line-2);
  }
  .week-item:last-child { border-bottom: 0; }
  .week-item .wk-num {
    font-family: var(--f-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--ink-3);
    min-width: 48px;
  }
  .week-item .wk-title {
    font-family: var(--f-display);
    font-variation-settings: "opsz" 24, "SOFT" 40, "wght" 440;
    font-size: 15.5px;
    color: var(--ink);
    line-height: 1.3;
  }
  .week-item .wk-date {
    font-family: var(--f-mono);
    font-size: 11px;
    color: var(--ink-3);
  }
  .week-item .wk-score {
    font-family: var(--f-mono);
    font-size: 13px;
    color: var(--ink);
    font-weight: 500;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink-3);
  }
  .empty-state .display {
    color: var(--ink-2);
    margin-bottom: 6px;
  }

  /* ═══════════════════════════════════════════════════════════════════
     TOAST
     ═══════════════════════════════════════════════════════════════════ */
  .toast {
    position: fixed;
    bottom: calc(var(--sab) + 20px);
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--ink);
    color: var(--bg);
    padding: 10px 14px;
    border-radius: var(--r-pill);
    font-size: 13.5px;
    font-family: var(--f-ui);
    z-index: 100;
    box-shadow: 0 10px 30px -10px rgba(26,24,21,0.4);
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s, transform .2s;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ═══════════════════════════════════════════════════════════════════
     UTILITIES
     ═══════════════════════════════════════════════════════════════════ */
  .muted { color: var(--ink-3); }
  .right { text-align: right; }
  .nowrap { white-space: nowrap; }
  .hidden { display: none !important; }
  .space-between { display: flex; justify-content: space-between; align-items: center; gap: 10px; }

  /* ═══════════════════════════════════════════════════════════════════
     TABS (segmented control)
     ═══════════════════════════════════════════════════════════════════ */
  .tabs {
    display: inline-flex;
    padding: 3px;
    background: var(--bg-sunken);
    border: 1px solid var(--line-2);
    border-radius: var(--r-pill);
    margin-bottom: 22px;
    gap: 2px;
  }
  .tab {
    font-family: var(--f-ui);
    font-size: 13px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: var(--r-pill);
    color: var(--ink-3);
    transition: color .15s, background .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab.active {
    background: var(--bg-raised);
    color: var(--ink);
    box-shadow: var(--shadow-1);
  }

  /* ═══════════════════════════════════════════════════════════════════
     WEEK CARDS (markdown import picker)
     ═══════════════════════════════════════════════════════════════════ */
  .week-card {
    padding: 16px 18px;
    margin-bottom: 10px;
  }
  .week-card .wc-label {
    font-family: var(--f-mono);
    font-size: 10.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .week-card .wc-title {
    font-family: var(--f-display);
    font-variation-settings: "opsz" 36, "SOFT" 40, "wght" 480;
    font-size: 17px;
    line-height: 1.2;
    color: var(--ink);
    letter-spacing: -0.005em;
  }
  .week-card .wc-meta {
    font-family: var(--f-mono);
    font-size: 11px;
    color: var(--ink-3);
    margin-top: 6px;
  }
  .week-card .wc-sources {
    font-size: 12px;
    color: var(--ink-3);
    margin-top: 6px;
    line-height: 1.45;
  }
  .week-card .wc-sources b {
    font-weight: 500;
    color: var(--ink-2);
  }
  .week-card .link-slot {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--line-2);
  }

  /* ═══════════════════════════════════════════════════════════════════
     RATIONALE (inside feedback bar)
     ═══════════════════════════════════════════════════════════════════ */
  .feedback-bar .rationale {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(26,24,21,0.08);
    font-family: var(--f-display);
    font-variation-settings: "opsz" 24, "SOFT" 60, "wght" 380;
    font-size: 14.5px;
    line-height: 1.45;
    font-style: italic;
    opacity: 0.92;
  }

  /* ═══════════════════════════════════════════════════════════════════
     RE-STUDY BLOCK (results screen, when sources provided)
     ═══════════════════════════════════════════════════════════════════ */
  .restudy {
    margin-top: 14px;
    padding: 14px 16px;
    background: var(--bg-raised);
    border: 1px solid var(--line-2);
    border-left: 3px solid var(--accent);
    border-radius: var(--r);
  }
  .restudy .eyebrow {
    margin-bottom: 4px;
  }
  .restudy .src {
    font-family: var(--f-mono);
    font-size: 12.5px;
    line-height: 1.5;
    color: var(--ink-2);
    word-break: break-word;
  }

  /* Small screens */
  @media (max-width: 380px) {
    .intro-stats { grid-template-columns: 1fr; }
    .kpi-row { grid-template-columns: 1fr 1fr; }
  }

  /* iOS standalone tweaks */
  @media (display-mode: standalone) {
    body { background-attachment: scroll; }
  }

    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2), v);
    else if (k === 'html') n.innerHTML = v;
    else n.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c === null || c === undefined || c === false) continue;
    n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return n;
};

// Base64 that's safe for Unicode
function b64encode(obj) {
  const s = JSON.stringify(obj);
  // encodeURIComponent → escape → btoa is the classic unicode-safe pattern
  const bytes = new TextEncoder().encode(s);
  let binary = '';
  for (const b of bytes) binary += String.fromCharCode(b);
  return btoa(binary).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function b64decode(b64) {
  const pad = '='.repeat((4 - b64.length % 4) % 4);
  const std = (b64 + pad).replace(/-/g,'+').replace(/_/g,'/');
  const binary = atob(std);
  const bytes = new Uint8Array(binary.length);
  for (let i=0; i<binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return JSON.parse(new TextDecoder().decode(bytes));
}

// Storage helpers
const STORE = {
  results: {
    key: 'quiz-app:results:v1',
    load() { try { return JSON.parse(localStorage.getItem(this.key)) || []; } catch { return []; } },
    save(v) { localStorage.setItem(this.key, JSON.stringify(v)); },
    add(r) {
      const arr = this.load();
      // de-dupe by week+date
      const sig = `${r.week}|${r.date}|${r.quizTitle}`;
      const idx = arr.findIndex(x => `${x.week}|${x.date}|${x.quizTitle}` === sig);
      if (idx >= 0) arr[idx] = r; else arr.push(r);
      arr.sort((a,b) => (a.week||0) - (b.week||0) || a.date.localeCompare(b.date));
      this.save(arr);
    },
    clear() { localStorage.removeItem(this.key); }
  }
};

// Toast
let toastTimer = null;
function toast(msg, ms=2200) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), ms);
}

// Copy to clipboard with fallback
async function copyText(text) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch {}
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    return true;
  } catch {
    return false;
  }
}

// Date helpers
function today() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

// Fisher–Yates shuffle (used only if we add a shuffle option; not by default)
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Validate a question object (used for JSON imports)
function validateQuestions(input) {
  // Accept either a bare array or an object with `questions`
  let title = '', week = null, sources = null;
  let arr = input;
  if (input && !Array.isArray(input) && typeof input === 'object') {
    title = input.title || '';
    week = input.week ?? null;
    sources = input.sources || null;
    arr = input.questions;
  }
  if (!Array.isArray(arr)) throw new Error('Expected an array of questions (or an object with a "questions" array).');
  if (arr.length === 0) throw new Error('No questions found.');
  const clean = arr.map((q, i) => {
    if (!q || typeof q !== 'object') throw new Error(`Question ${i+1}: not an object.`);
    if (typeof q.question !== 'string' || !q.question.trim()) throw new Error(`Question ${i+1}: missing "question" text.`);
    if (!Array.isArray(q.choices) || q.choices.length < 2) throw new Error(`Question ${i+1}: needs "choices" array with at least 2 items.`);
    if (q.choices.some(c => typeof c !== 'string')) throw new Error(`Question ${i+1}: all choices must be strings.`);
    if (typeof q.correct !== 'number' || q.correct < 0 || q.correct >= q.choices.length || !Number.isInteger(q.correct)) {
      throw new Error(`Question ${i+1}: "correct" must be an integer index into choices (0–${q.choices.length-1}).`);
    }
    const out = {
      question: q.question.trim(),
      choices: q.choices.map(c => c.trim()),
      correct: q.correct,
      topic: (q.topic || '').trim() || 'General'
    };
    if (q.rationale && typeof q.rationale === 'string') out.rationale = q.rationale.trim();
    return out;
  });
  return { title, week, sources, questions: clean };
}

// Parse a paired quiz/answer-key markdown (CCE spec).
// Returns an array of quiz packages, one per week:
//   [{ title, week, sources, questions: [{question, choices, correct, topic, rationale}] }, ...]
function parseQuizMarkdown(quizMd, keyMd) {
  if (!quizMd || !quizMd.trim()) throw new Error('Quiz markdown is empty.');
  if (!keyMd  || !keyMd.trim())  throw new Error('Answer-key markdown is empty.');

  // ── 1. Walk the quiz file, accumulating weeks ────────────────────────
  const quizLines = quizMd.split(/\r?\n/);
  const weeks = []; // [{ week, title, sources, questions: [...] }]
  let current = null;

  const weekRe   = /^##\s+Week\s+(\d+)\s+—\s+(.+?)\s*$/;
  const sourceRe = /^\*\*Sources:\*\*\s*(.+?)\s*$/;
  const qRe      = /^###\s+Q(\d+)\.\s+(.+?)\s*$/;
  const optRe    = /^([A-D])\.\s+(.+?)\s*$/;

  for (let i = 0; i < quizLines.length; i++) {
    const line = quizLines[i];

    const wm = line.match(weekRe);
    if (wm) {
      if (current) weeks.push(current);
      current = { week: +wm[1], title: wm[2], sources: null, questions: [] };
      continue;
    }
    if (!current) continue; // skip preamble before first ## Week

    const sm = line.match(sourceRe);
    if (sm && !current.sources) {
      current.sources = sm[1].replace(/\.\s*$/, '').trim();
      continue;
    }

    const qm = line.match(qRe);
    if (qm) {
      const qNum = +qm[1];
      const stem = qm[2];
      // Look ahead for 4 option lines A → D
      const choices = [];
      let j = i + 1;
      while (j < quizLines.length && choices.length < 4) {
        const raw = quizLines[j];
        if (!raw.trim()) { j++; continue; }
        // If we hit the next Q or next week heading, stop
        if (weekRe.test(raw) || qRe.test(raw)) break;
        const om = raw.match(optRe);
        if (!om) {
          throw new Error(`Week ${current.week} Q${qNum}: expected an option line (A./B./C./D.), got: "${raw.trim()}"`);
        }
        const expectedLetter = String.fromCharCode(65 + choices.length);
        if (om[1] !== expectedLetter) {
          throw new Error(`Week ${current.week} Q${qNum}: options out of order — expected ${expectedLetter}, got ${om[1]}`);
        }
        choices.push(om[2]);
        j++;
      }
      if (choices.length !== 4) {
        throw new Error(`Week ${current.week} Q${qNum}: expected 4 options, got ${choices.length}.`);
      }
      current.questions.push({ qNum, stem, choices, correct: null, rationale: null });
      i = j - 1; // continue after the options
    }
  }
  if (current) weeks.push(current);

  if (weeks.length === 0) throw new Error('No "## Week N — …" headings found in quiz file.');

  // Integrity check: 10 questions per week
  for (const w of weeks) {
    if (w.questions.length !== 10) {
      throw new Error(`Week ${w.week} has ${w.questions.length} question${w.questions.length===1?'':'s'}, expected 10.`);
    }
    const nums = w.questions.map(q => q.qNum);
    for (let k = 0; k < 10; k++) {
      if (nums[k] !== k + 1) throw new Error(`Week ${w.week}: question numbering out of order (got Q${nums[k]} at position ${k+1}).`);
    }
  }

  // ── 2. Walk the answer key file ──────────────────────────────────────
  const keyLines = keyMd.split(/\r?\n/);
  // Accept em-dash, en-dash, or hyphen between the letter and rationale (spec says em-dash).
  const ansRe = /^Q(\d+)\.\s+\*\*([A-D])\*\*\s*[—–-]\s*(.+?)\s*$/;
  const keyByWeek = new Map();
  let keyWeek = null;

  for (const line of keyLines) {
    const wm = line.match(weekRe);
    if (wm) {
      keyWeek = +wm[1];
      if (!keyByWeek.has(keyWeek)) keyByWeek.set(keyWeek, new Map());
      continue;
    }
    const am = line.match(ansRe);
    if (am && keyWeek != null) {
      const qNum = +am[1];
      keyByWeek.get(keyWeek).set(qNum, {
        letter: am[2],
        rationale: am[3].replace(/\s*\.\s*$/, '').trim()
      });
    }
  }

  if (keyByWeek.size === 0) throw new Error('No "## Week N — …" headings found in answer-key file.');

  // ── 3. Merge and build final packages ────────────────────────────────
  const quizzes = weeks.map(w => {
    const map = keyByWeek.get(w.week);
    if (!map) throw new Error(`Answer key has no Week ${w.week}.`);
    if (map.size < 10) {
      throw new Error(`Answer key for Week ${w.week} has ${map.size} answers, expected 10.`);
    }
    const questions = w.questions.map(q => {
      const a = map.get(q.qNum);
      if (!a) throw new Error(`Answer key missing Week ${w.week} Q${q.qNum}.`);
      return {
        question: q.stem,
        choices: q.choices,
        correct: a.letter.charCodeAt(0) - 65,
        topic: w.title,
        rationale: a.rationale
      };
    });
    return {
      title: `Week ${w.week} — ${w.title}`,
      week: w.week,
      sources: w.sources,
      questions
    };
  });

  return quizzes;
}

// Build a link card (the part showing the generated URL + copy/iMessage/preview).
// Used by both markdown week cards and the JSON panel.
function buildLinkCard(quizPkg) {
  const pkg = {
    t: quizPkg.title,
    w: quizPkg.week,
    s: quizPkg.sources || undefined,
    q: quizPkg.questions
  };
  const hash = 'q=' + b64encode(pkg);
  const base = location.origin + location.pathname;
  const url = `${base}#${hash}`;

  const box = el('div', {});
  box.appendChild(el('div', { class: 'eyebrow', style: { marginBottom: '10px' } }, 'Shareable link'));
  box.appendChild(el('textarea', {
    class: 'textarea',
    readonly: 'true',
    style: { minHeight: '84px', fontSize: '11.5px' }
  }, url));
  box.appendChild(el('div', {
    class: 'mono',
    style: { fontSize: '11px', color: 'var(--ink-3)', marginTop: '6px' }
  }, `${url.length.toLocaleString()} characters · ${quizPkg.questions.length} questions`));

  const label = quizPkg.week ? `Week ${quizPkg.week}` : 'This week';
  box.appendChild(el('div', { class: 'row', style: { marginTop: '12px' } },
    el('button', {
      class: 'btn block',
      onclick: async () => {
        const ok = await copyText(url);
        toast(ok ? 'Link copied' : 'Copy failed');
      }
    }, 'Copy link'),
    el('button', {
      class: 'btn ghost',
      onclick: () => {
        const body = `Here's ${label}'s quiz:\n\n${url}`;
        location.href = 'sms:&body=' + encodeURIComponent(body);
      }
    }, 'iMessage')
  ));
  box.appendChild(el('a', {
    href: '#' + hash,
    class: 'btn quiet block',
    style: { marginTop: '8px' }
  }, 'Preview quiz →'));
  return box;
}

// ─── Create: Markdown panel ───────────────────────────────────────────
function markdownPanel() {
  const panel = el('div', { class: 'stack' });
  let parsedQuizzes = [];

  const quizTA = el('textarea', {
    class: 'textarea',
    placeholder: 'Paste CCE_Weekly_Quizzes.md contents here…',
    spellcheck: 'false', autocapitalize: 'off', autocorrect: 'off'
  });
  const keyTA = el('textarea', {
    class: 'textarea',
    placeholder: 'Paste CCE_Weekly_Quiz_AnswerKey.md contents here…',
    spellcheck: 'false', autocapitalize: 'off', autocorrect: 'off'
  });
  const statusBox = el('div', { style: { fontSize: '13px', color: 'var(--ink-3)', minHeight: '20px' } }, 'Paste both files to parse.');
  const weekListEl = el('div', { class: 'hidden' });

  // Hidden file inputs
  const quizFile = el('input', { type: 'file', accept: '.md,text/markdown,text/plain', style: { display: 'none' } });
  const keyFile  = el('input', { type: 'file', accept: '.md,text/markdown,text/plain', style: { display: 'none' } });
  const readFile = (f, ta) => {
    const r = new FileReader();
    r.onload = () => { ta.value = r.result; parse(); };
    r.readAsText(f);
  };
  quizFile.addEventListener('change', e => { const f = e.target.files[0]; if (f) readFile(f, quizTA); });
  keyFile .addEventListener('change', e => { const f = e.target.files[0]; if (f) readFile(f, keyTA);  });

  function parse() {
    const quiz = quizTA.value.trim();
    const key  = keyTA.value.trim();
    weekListEl.classList.add('hidden');
    parsedQuizzes = [];
    if (!quiz && !key) {
      statusBox.textContent = 'Paste both files to parse.';
      statusBox.style.color = 'var(--ink-3)';
      return;
    }
    if (!quiz || !key) {
      statusBox.innerHTML = `<span style="color:var(--ink-3)">Waiting —</span> paste ${!quiz ? 'quiz' : 'answer key'} file too.`;
      return;
    }
    try {
      parsedQuizzes = parseQuizMarkdown(quiz, key);
      const totalQs = parsedQuizzes.reduce((s, q) => s + q.questions.length, 0);
      statusBox.innerHTML = `<span style="color:var(--ok)">✓ Parsed</span> — ${parsedQuizzes.length} week${parsedQuizzes.length===1?'':'s'}, ${totalQs} questions.`;
      renderWeekList();
      weekListEl.classList.remove('hidden');
    } catch (e) {
      statusBox.innerHTML = `<span style="color:var(--no)">✗</span> ${e.message}`;
    }
  }

  function renderWeekList() {
    weekListEl.innerHTML = '';
    weekListEl.appendChild(el('div', {
      class: 'eyebrow muted',
      style: { marginTop: '22px', marginBottom: '12px' }
    }, `${parsedQuizzes.length === 1 ? 'Quiz ready' : 'Weeks loaded — tap any week to get its link'}`));
    parsedQuizzes.forEach(q => weekListEl.appendChild(renderWeekCard(q)));
  }

  quizTA.addEventListener('input', parse);
  keyTA .addEventListener('input', parse);

  panel.appendChild(el('div', {},
    el('div', { class: 'space-between', style: { marginBottom: '6px' } },
      el('label', { class: 'field', style: { marginBottom: '0' } }, 'Quiz file (.md)'),
      el('button', { class: 'btn quiet', style: { fontSize: '12px', padding: '4px 10px', minHeight: 'auto' }, onclick: () => quizFile.click() }, 'Upload file')
    ),
    quizTA
  ));
  panel.appendChild(el('div', {},
    el('div', { class: 'space-between', style: { marginBottom: '6px' } },
      el('label', { class: 'field', style: { marginBottom: '0' } }, 'Answer key (.md)'),
      el('button', { class: 'btn quiet', style: { fontSize: '12px', padding: '4px 10px', minHeight: 'auto' }, onclick: () => keyFile.click() }, 'Upload file')
    ),
    keyTA
  ));
  panel.appendChild(statusBox);
  panel.appendChild(weekListEl);
  panel.appendChild(quizFile);
  panel.appendChild(keyFile);

  // Footer help
  panel.appendChild(el('hr', { class: 'rule' }));
  panel.appendChild(el('details', { style: { fontSize: '14px', color: 'var(--ink-2)' } },
    el('summary', { style: { cursor: 'pointer', fontWeight: '500' } }, 'Expected format'),
    el('p', { style: { marginTop: '10px', lineHeight: '1.55' } },
      'Two paired markdown files. Quiz file uses ', el('code', {}, '## Week N — Title'),
      ' headings, ', el('code', {}, '### QN. stem'), ' for each question, ',
      'and option lines like ', el('code', {}, 'A. text'), ' through D. Answer key uses ',
      el('code', {}, 'QN. **L** — rationale'), ' (em-dash). Rationale appears in the quiz feedback ',
      'when she picks the wrong answer.'
    )
  ));

  return panel;
}

// One card per parsed week, reveals the shareable link when tapped
function renderWeekCard(quizPkg) {
  let revealed = false;
  const card = el('div', { class: 'card week-card' });
  const body = el('div');
  const slot = el('div', { class: 'link-slot hidden' });

  const actionBtn = el('button', { class: 'btn', onclick: () => toggle() }, 'Get link');

  function toggle() {
    revealed = !revealed;
    if (revealed) {
      slot.innerHTML = '';
      slot.appendChild(buildLinkCard(quizPkg));
      slot.classList.remove('hidden');
      actionBtn.textContent = 'Hide';
    } else {
      slot.classList.add('hidden');
      slot.innerHTML = '';
      actionBtn.textContent = 'Get link';
    }
  }

  body.appendChild(el('div', { class: 'space-between', style: { alignItems: 'flex-start', gap: '14px' } },
    el('div', { style: { flex: '1', minWidth: '0' } },
      el('div', { class: 'wc-label' }, `Week ${quizPkg.week}`),
      el('div', { class: 'wc-title' }, quizPkg.title.replace(/^Week\s+\d+\s+—\s+/, '')),
      el('div', { class: 'wc-meta' }, `${quizPkg.questions.length} questions`),
      quizPkg.sources
        ? el('div', { class: 'wc-sources' }, el('b', {}, 'Sources: '), quizPkg.sources)
        : null
    ),
    actionBtn
  ));
  card.appendChild(body);
  card.appendChild(slot);
  return card;
}

// ─── Create: JSON panel ───────────────────────────────────────────────
function jsonPanel() {
  const panel = el('div', { class: 'stack' });
  let parsed = null;

  const jsonArea = el('textarea', {
    class: 'textarea',
    placeholder: 'Paste question JSON here…\n\n[\n  {\n    "question": "…",\n    "choices": ["A", "B", "C", "D"],\n    "correct": 0,\n    "topic": "History"\n  }\n]',
    spellcheck: 'false', autocapitalize: 'off', autocorrect: 'off'
  });
  const titleInput = el('input', { class: 'input', placeholder: 'e.g. Week 4 — Differential diagnosis' });
  const weekInput  = el('input', { class: 'input', type: 'number', inputmode: 'numeric', min: '1', placeholder: '4' });
  const statusBox  = el('div', { style: { fontSize: '13px', color: 'var(--ink-3)' } }, 'Not loaded.');
  const linkSlot   = el('div', { class: 'hidden' });

  function parse() {
    const txt = jsonArea.value.trim();
    linkSlot.classList.add('hidden');
    linkSlot.innerHTML = '';
    if (!txt) {
      parsed = null;
      statusBox.textContent = 'Not loaded.';
      statusBox.style.color = 'var(--ink-3)';
      return;
    }
    try {
      const raw = JSON.parse(txt);
      parsed = validateQuestions(raw);
      if (parsed.title && !titleInput.value) titleInput.value = parsed.title;
      if (parsed.week != null && !weekInput.value) weekInput.value = parsed.week;
      const topics = [...new Set(parsed.questions.map(q => q.topic))];
      statusBox.innerHTML = `<span style="color:var(--ok)">✓ Loaded</span> — ${parsed.questions.length} question${parsed.questions.length===1?'':'s'} across ${topics.length} topic${topics.length===1?'':'s'}.`;
    } catch (e) {
      parsed = null;
      statusBox.innerHTML = `<span style="color:var(--no)">✗</span> ${e.message}`;
    }
  }
  jsonArea.addEventListener('input', parse);

  function makeLink() {
    if (!parsed) { toast('Paste valid JSON first'); return; }
    const quizPkg = {
      title: titleInput.value.trim() || parsed.title || 'Untitled quiz',
      week: Number(weekInput.value) || parsed.week || null,
      sources: parsed.sources,
      questions: parsed.questions
    };
    linkSlot.innerHTML = '';
    const card = el('div', { class: 'card' });
    card.appendChild(buildLinkCard(quizPkg));
    linkSlot.appendChild(card);
    linkSlot.classList.remove('hidden');
  }

  panel.appendChild(el('div', {},
    el('label', { class: 'field' }, 'Questions (JSON)'),
    jsonArea,
    el('div', { style: { marginTop: '8px' } }, statusBox)
  ));
  panel.appendChild(el('div', { class: 'row' },
    el('div', { style: { flex: '2' } },
      el('label', { class: 'field' }, 'Quiz title'),
      titleInput
    ),
    el('div', { style: { flex: '1' } },
      el('label', { class: 'field' }, 'Week #'),
      weekInput
    )
  ));
  panel.appendChild(el('button', { class: 'btn block lg', onclick: makeLink }, 'Generate shareable link'));
  panel.appendChild(linkSlot);

  // JSON format reference
  panel.appendChild(el('hr', { class: 'rule' }));
  panel.appendChild(el('details', { style: { fontSize: '14px', color: 'var(--ink-2)' } },
    el('summary', { style: { cursor: 'pointer', fontWeight: '500' } }, 'Format reference'),
    el('p', { style: { marginTop: '10px' } }, 'Ask Claude to output questions in this exact shape:'),
    el('pre', {
      class: 'textarea',
      style: { minHeight: 'auto', background: 'var(--bg-sunken)', whiteSpace: 'pre', overflow: 'auto', padding: '12px' }
    }, `[
  {
    "question": "A 68-year-old presents with…",
    "choices": ["Option A", "Option B", "Option C", "Option D"],
    "correct": 2,
    "topic": "Differential diagnosis",
    "rationale": "Optional — shown when she picks wrong."
  }
]`),
    el('p', { class: 'muted', style: { fontSize: '13px' } },
      '"correct" is the zero-based index. "topic" groups questions for the per-topic score breakdown. "rationale" is optional.'
    )
  ));

  return panel;
}

// ─── Take quiz ────────────────────────────────────────────────────────
function viewQuiz(pkg) {
  // pkg: { t, w, s, q: [...] } (decoded from hash)
  const title = pkg.t || 'Quiz';
  const week = pkg.w;
  const sources = pkg.s || null;
  const questions = pkg.q;

  // If every question carries the same topic, the per-question topic label
  // is redundant (especially for CCE markdown imports where week == topic).
  const topicSet = new Set(questions.map(q => q.topic || 'General'));
  const showPerQTopic = topicSet.size > 1;

  const state = {
    idx: 0,
    selected: null,      // chosen choice index (before submit)
    locked: false,       // after submit, locked
    answers: [],         // array of { chosen, correct } per question
    started: false
  };

  const container = el('div', { class: 'view' });
  container.appendChild(renderTopbar(week ? `Week ${String(week).padStart(2,'0')}` : 'Quiz'));

  const wrap = el('div', { class: 'wrap' });
  container.appendChild(wrap);

  function render() {
    wrap.innerHTML = '';
    if (!state.started) return renderIntro();
    if (state.idx >= questions.length) return renderResults();
    return renderQuestion();
  }

  function renderIntro() {
    const topics = [...new Set(questions.map(q => q.topic))];
    wrap.appendChild(el('div', { class: 'intro-meta' },
      week ? el('span', { class: 'pill' }, `Week ${week}`) : null,
      week ? el('span', { class: 'sep' }, '·') : null,
      el('span', {}, `${questions.length} question${questions.length===1?'':'s'}`),
    ));
    wrap.appendChild(el('h1', { class: 'display', style: { marginBottom: '12px' } }, title, el('span', { style: { color: 'var(--no)' } }, '.')));
    wrap.appendChild(el('p', { class: 'lede' }, 'Read each question, choose your answer, and submit when you\'re ready. You\'ll see feedback after each one.'));

    wrap.appendChild(el('div', { class: 'intro-stats' },
      el('div', { class: 'stat' },
        el('div', { class: 'stat-k' }, 'Questions'),
        el('div', { class: 'stat-v' }, String(questions.length))
      ),
      el('div', { class: 'stat' },
        el('div', { class: 'stat-k' }, 'Topics'),
        el('div', { class: 'stat-v' }, String(topics.length))
      ),
    ));

    if (topics.length) {
      wrap.appendChild(el('div', { class: 'topics-list', style: { marginTop: '22px' } },
        el('div', { class: 'eyebrow muted', style: { marginBottom: '10px' } }, 'Covering'),
        el('div', {}, topics.map(t => el('span', { class: 'topic-chip' }, t)))
      ));
    }

    wrap.appendChild(el('div', { style: { marginTop: '28px' } },
      el('button', {
        class: 'btn block lg',
        onclick: () => { state.started = true; render(); }
      }, 'Begin', el('span', { class: 'arrow' }, ' →'))
    ));
  }

  function renderQuestion() {
    const q = questions[state.idx];
    const total = questions.length;

    // Progress marks
    const marks = el('div', { class: 'progress', 'aria-hidden': 'true' });
    for (let i=0; i<total; i++) {
      let cls = 'mark';
      if (i < state.idx) cls += ' ' + (state.answers[i].chosen === state.answers[i].correct ? 'correct' : 'incorrect');
      else if (i === state.idx) cls += state.locked
        ? (' ' + (state.selected === q.correct ? 'correct' : 'incorrect'))
        : ' current';
      marks.appendChild(el('div', { class: cls }));
    }
    wrap.appendChild(marks);

    wrap.appendChild(el('div', { class: 'qhead' },
      el('div', { class: 'counter' },
        'Q ', el('b', {}, String(state.idx+1).padStart(2,'0')),
        ' / ', String(total).padStart(2,'0')
      ),
      showPerQTopic ? el('div', { class: 'topic' }, q.topic || '') : null
    ));

    wrap.appendChild(el('div', { class: 'question' },
      el('div', { class: 'q-text' }, q.question)
    ));

    const choicesEl = el('div', { class: 'choices' });
    const letters = ['A','B','C','D','E','F','G','H'];
    q.choices.forEach((txt, i) => {
      const c = el('button', {
        class: 'choice',
        'data-letter': letters[i] || String(i+1),
        onclick: () => {
          if (state.locked) return;
          state.selected = i;
          // Update selected visuals
          [...choicesEl.children].forEach((ch, j) => {
            ch.classList.toggle('selected', j === i);
          });
          submitBtn.disabled = false;
        }
      }, txt);
      // Mark icon (✓ for correct answer, ✗ for the one she picked if wrong)
      let markGlyph = '✓';
      if (state.locked && i === state.selected && state.selected !== q.correct) markGlyph = '✗';
      const mark = el('span', { class: 'tick' }, markGlyph);
      c.appendChild(mark);
      if (state.selected === i && !state.locked) c.classList.add('selected');
      if (state.locked) {
        c.classList.add('disabled');
        if (i === q.correct) c.classList.add('correct');
        else if (i === state.selected) c.classList.add('incorrect');
      }
      choicesEl.appendChild(c);
    });
    wrap.appendChild(choicesEl);

    // Feedback bar (after lock)
    if (state.locked) {
      const correct = state.selected === q.correct;
      const fb = el('div', { class: 'feedback-bar ' + (correct ? 'ok' : 'no') });
      if (correct) {
        fb.appendChild(el('div', { style: { flex: '1' } },
          el('b', {}, 'Correct.'), ' Nicely done.'
        ));
      } else {
        const msg = el('div', { style: { flex: '1' } },
          el('b', {}, 'Not quite.'), ' The answer is ',
          el('b', {}, letters[q.correct] || '?'), ' — ',
          el('em', {}, q.choices[q.correct]),
          '.'
        );
        if (q.rationale) {
          msg.appendChild(el('div', { class: 'rationale' }, q.rationale + '.'));
        }
        fb.appendChild(msg);
      }
      wrap.appendChild(fb);
    }

    // Submit / Next button
    const submitBtn = el('button', {
      class: 'btn lg',
      disabled: state.selected === null && !state.locked,
      onclick: () => {
        if (!state.locked) {
          if (state.selected === null) return;
          state.locked = true;
          state.answers[state.idx] = { chosen: state.selected, correct: q.correct };
          render();
        } else {
          // advance
          state.idx++;
          state.selected = null;
          state.locked = false;
          render();
          window.scrollTo({ top: 0, behavior: 'instant' });
        }
      }
    }, state.locked
       ? (state.idx === total - 1 ? ['See results', el('span', { class: 'arrow' }, ' →')] : ['Next', el('span', { class: 'arrow' }, ' →')])
       : 'Submit answer'
    );

    wrap.appendChild(el('div', { class: 'qactions' }, submitBtn));
  }

  function renderResults() {
    const total = questions.length;
    const score = state.answers.filter(a => a.chosen === a.correct).length;
    const pct = Math.round((score/total)*100);

    // Build per-topic breakdown
    const byTopic = {};
    questions.forEach((q, i) => {
      const t = q.topic || 'General';
      if (!byTopic[t]) byTopic[t] = { correct: 0, total: 0 };
      byTopic[t].total++;
      if (state.answers[i].chosen === state.answers[i].correct) byTopic[t].correct++;
    });

    // Build result JSON (matches the spec; sources is an optional addition)
    const resultObj = {
      week: week,
      date: today(),
      quizTitle: title,
      score,
      total,
      percentage: pct,
      results: questions.map((q, i) => ({
        question: q.question,
        topic: q.topic || 'General',
        correct: state.answers[i].chosen === state.answers[i].correct,
        chosenAnswer: q.choices[state.answers[i].chosen],
        correctAnswer: q.choices[q.correct]
      }))
    };
    if (sources) resultObj.sources = sources;

    // Header / score
    const scoreNote = pct === 100
      ? 'A clean sweep.'
      : pct >= 80 ? 'Strong pass.'
      : pct >= 60 ? 'Getting there.'
      : 'Worth another look.';

    wrap.appendChild(el('div', { class: 'result-hero' },
      el('span', { class: 'eyebrow' }, week ? `Week ${week} · ${today()}` : today()),
      el('h1', { class: 'display', style: { marginTop: '10px', fontSize: 'clamp(28px,6vw,36px)' } }, title),
      el('div', { style: { marginTop: '18px', display: 'flex', alignItems: 'baseline', gap: '14px' } },
        el('div', { class: 'score-big' }, String(score), el('span', { class: 'over' }, ` / ${total}`)),
        el('div', {},
          el('div', { class: 'score-pct' }, `${pct}%`),
          el('div', {
            style: {
              fontFamily: 'var(--f-display)',
              fontVariationSettings: '"opsz" 24, "SOFT" 50, "wght" 420',
              fontStyle: 'italic',
              fontSize: '15px',
              color: 'var(--ink-2)',
              marginTop: '2px'
            }
          }, scoreNote)
        )
      )
    ));

    // By topic
    wrap.appendChild(el('div', { class: 'card', style: { marginTop: '22px' } },
      el('div', { class: 'eyebrow muted', style: { marginBottom: '12px' } }, 'By topic'),
      el('div', { class: 'topic-grid' },
        Object.entries(byTopic).map(([t, v]) => {
          const p = v.correct / v.total;
          const cls = p < 0.5 ? 'low' : p < 0.8 ? 'mid' : '';
          return el('div', { class: 'topic-row ' + cls },
            el('div', {},
              el('div', { class: 't-name' }, t),
              el('div', { class: 't-bar' }, el('i', { style: { width: (p*100)+'%' } }))
            ),
            el('div', { class: 't-score' }, `${v.correct}/${v.total}`)
          );
        })
      )
    ));

    // Review
    const wrongCount = state.answers.filter((a, i) => a.chosen !== a.correct).length;
    if (wrongCount > 0) {
      wrap.appendChild(el('div', { class: 'card', style: { marginTop: '14px' } },
        el('div', { class: 'eyebrow muted', style: { marginBottom: '6px' } }, `Review — ${wrongCount} to revisit`),
        el('div', {},
          questions.map((q, i) => {
            const a = state.answers[i];
            if (a.chosen === a.correct) return null;
            return el('div', { class: 'review-item' },
              el('div', { class: 'ri-topic' }, q.topic || 'General'),
              el('div', { class: 'ri-q' }, q.question),
              el('div', { class: 'ri-meta' },
                'You chose: ', el('span', { class: 'chosen' }, q.choices[a.chosen] || '—'),
                ' · Correct: ', el('span', { class: 'chosen ok' }, q.choices[q.correct])
              )
            );
          }).filter(Boolean)
        )
      ));
    }

    // Re-study pointer (if sources were provided with the quiz)
    if (sources && wrongCount > 0) {
      wrap.appendChild(el('div', { class: 'restudy' },
        el('div', { class: 'eyebrow' }, 'Re-study'),
        el('div', { class: 'src' }, sources)
      ));
    }

    // Send results
    const setterBase = location.origin + location.pathname;
    const resultHash = 'r=' + b64encode(resultObj);
    const setterUrl = `${setterBase}#${resultHash}`;
    const smsBody =
`${title}
${week ? `Week ${week} · ` : ''}${today()}
Score: ${score}/${total} (${pct}%)

Results link:
${setterUrl}`;

    wrap.appendChild(el('div', { class: 'card', style: { marginTop: '14px', background: 'var(--bg-sunken)' } },
      el('div', { class: 'eyebrow', style: { marginBottom: '8px' } }, 'Send results'),
      el('p', { style: { fontSize: '14px', color: 'var(--ink-2)', marginTop: '0', marginBottom: '14px', lineHeight: '1.5' } },
        'Tap below to open iMessage with a pre-filled message. The link opens their dashboard and imports these results automatically.'
      ),
      el('button', {
        class: 'btn block lg',
        onclick: () => {
          location.href = 'sms:&body=' + encodeURIComponent(smsBody);
        }
      }, 'Send results in iMessage'),
      el('div', { class: 'row', style: { marginTop: '8px' } },
        el('button', {
          class: 'btn ghost block',
          onclick: async () => {
            const ok = await copyText(setterUrl);
            toast(ok ? 'Link copied' : 'Copy failed');
          }
        }, 'Copy link'),
        el('button', {
          class: 'btn ghost block',
          onclick: async () => {
            const ok = await copyText(JSON.stringify(resultObj, null, 2));
            toast(ok ? 'JSON copied' : 'Copy failed');
          }
        }, 'Copy JSON')
      )
    ));

    // Retake / home
    wrap.appendChild(el('div', { style: { marginTop: '16px', display: 'flex', gap: '10px' } },
      el('button', {
        class: 'btn quiet',
        onclick: () => {
          state.idx = 0;
          state.selected = null;
          state.locked = false;
          state.answers = [];
          state.started = false;
          render();
          window.scrollTo({ top: 0 });
        }
      }, 'Retake quiz')
    ));
  }

  render();
  return container;
}

// ─── Dashboard (setter) ───────────────────────────────────────────────
function viewDashboard() {
  const v = el('div', { class: 'view' });
  v.appendChild(renderTopbar('Dashboard'));

  const wrap = el('div', { class: 'wrap' });
  v.appendChild(wrap);

  function render() {
    wrap.innerHTML = '';
    wrap.appendChild(el('a', { href: '#', class: 'eyebrow muted', style: { textDecoration: 'none' } }, '← Back'));
    wrap.appendChild(el('div', { class: 'space-between', style: { marginTop: '8px', marginBottom: '22px' } },
      el('h2', { class: 'display' }, 'Progress'),
      el('button', { class: 'btn quiet', onclick: showImport }, '+ Import result')
    ));

    const results = STORE.results.load();

    if (!results.length) {
      wrap.appendChild(el('div', { class: 'empty-state' },
        el('div', { class: 'display', style: { fontSize: '22px' } }, 'No results yet.'),
        el('p', { style: { maxWidth: '28em', margin: '10px auto', color: 'var(--ink-3)' } },
          'When the quiz taker sends back results via iMessage, tap the link to import it here. Or paste a results JSON manually.'
        ),
        el('button', { class: 'btn', onclick: showImport, style: { marginTop: '16px' } }, 'Import first result')
      ));
      return;
    }

    // KPIs
    const latest = results[results.length - 1];
    const avg = Math.round(results.reduce((s,r) => s + (r.percentage||0), 0) / results.length);
    const weeksCount = results.length;

    wrap.appendChild(el('div', { class: 'kpi-row' },
      el('div', { class: 'kpi' },
        el('div', { class: 'kpi-k' }, 'Latest'),
        el('div', { class: 'kpi-v' }, `${latest.percentage}%`)
      ),
      el('div', { class: 'kpi' },
        el('div', { class: 'kpi-k' }, 'Average'),
        el('div', { class: 'kpi-v' }, `${avg}%`)
      ),
      el('div', { class: 'kpi' },
        el('div', { class: 'kpi-k' }, 'Weeks'),
        el('div', { class: 'kpi-v' }, String(weeksCount))
      )
    ));

    // Trend chart
    wrap.appendChild(renderTrendChart(results));

    // Weak topics
    wrap.appendChild(renderTopicSummary(results));

    // Weeks list
    wrap.appendChild(el('div', { class: 'card', style: { marginTop: '14px' } },
      el('div', { class: 'space-between', style: { marginBottom: '6px' } },
        el('div', { class: 'eyebrow muted' }, 'Weekly history'),
        el('button', { class: 'btn quiet', style: { fontSize: '12px', padding: '4px 8px' }, onclick: () => {
          if (confirm('Clear all imported results? This cannot be undone.')) {
            STORE.results.clear();
            render();
          }
        }}, 'Clear all')
      ),
      el('div', { class: 'week-list' },
        [...results].reverse().map(r =>
          el('div', { class: 'week-item' },
            el('div', { class: 'wk-num' }, r.week ? `W${String(r.week).padStart(2,'0')}` : '—'),
            el('div', {},
              el('div', { class: 'wk-title' }, r.quizTitle || 'Untitled'),
              el('div', { class: 'wk-date mono' }, r.date)
            ),
            el('div', { class: 'wk-score' }, `${r.score}/${r.total}`),
            el('div', { class: 'wk-score mono', style: { color: pctColor(r.percentage), minWidth: '42px', textAlign: 'right' } }, `${r.percentage}%`)
          )
        )
      )
    ));
  }

  function showImport() {
    const modal = el('div', {
      style: {
        position: 'fixed', inset: '0', background: 'rgba(26,24,21,0.5)',
        display: 'flex', alignItems: 'flex-end', justifyContent: 'center',
        zIndex: '200', padding: '16px', paddingBottom: 'calc(var(--sab) + 16px)'
      }
    });
    const ta = el('textarea', {
      class: 'textarea',
      placeholder: 'Paste results JSON here, or the sms link…',
      style: { minHeight: '200px' }
    });
    const box = el('div', {
      style: {
        background: 'var(--bg-raised)', borderRadius: 'var(--r-lg)',
        padding: '18px', width: '100%', maxWidth: '520px',
        border: '1px solid var(--line-2)'
      }
    },
      el('div', { class: 'space-between', style: { marginBottom: '12px' } },
        el('div', { class: 'eyebrow' }, 'Import result'),
        el('button', { class: 'btn quiet', onclick: () => modal.remove() }, 'Cancel')
      ),
      ta,
      el('button', {
        class: 'btn block',
        style: { marginTop: '12px' },
        onclick: () => {
          let txt = ta.value.trim();
          if (!txt) { toast('Paste something first'); return; }
          // If it's a URL with #r=, extract
          try {
            if (txt.includes('#r=')) {
              const after = txt.split('#r=')[1];
              const pkg = b64decode(after.split(/\s/)[0]);
              STORE.results.add(pkg);
              toast('Result imported');
              modal.remove();
              render();
              return;
            }
            const obj = JSON.parse(txt);
            if (!obj.results || typeof obj.percentage !== 'number') throw new Error('Missing fields');
            STORE.results.add(obj);
            toast('Result imported');
            modal.remove();
            render();
          } catch (e) {
            toast('Could not parse: ' + e.message);
          }
        }
      }, 'Import')
    );
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
    modal.appendChild(box);
    document.body.appendChild(modal);
    setTimeout(() => ta.focus(), 50);
  }

  render();
  return v;
}

function pctColor(p) {
  if (p >= 80) return 'var(--ok)';
  if (p >= 60) return '#9A7930';
  return 'var(--no)';
}

function renderTrendChart(results) {
  const W = 600, H = 180, PAD = 24;
  const n = results.length;
  const xs = results.map((_, i) => PAD + (n === 1 ? (W-PAD*2)/2 : (i * (W - PAD*2) / (n-1))));
  const ys = results.map(r => H - PAD - ((r.percentage||0)/100) * (H - PAD*2));

  // Build SVG
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('preserveAspectRatio', 'none');
  svg.setAttribute('style', 'width:100%; height:180px; display:block;');

  // Gridlines at 0, 50, 100
  [0, 50, 100].forEach(v => {
    const y = H - PAD - (v/100) * (H - PAD*2);
    const line = document.createElementNS(svgNS, 'line');
    line.setAttribute('x1', PAD); line.setAttribute('x2', W-PAD);
    line.setAttribute('y1', y);   line.setAttribute('y2', y);
    line.setAttribute('stroke', '#D6CCB7');
    line.setAttribute('stroke-dasharray', v === 0 || v === 100 ? '0' : '2,3');
    line.setAttribute('stroke-width', '1');
    svg.appendChild(line);
    const lbl = document.createElementNS(svgNS, 'text');
    lbl.setAttribute('x', 4); lbl.setAttribute('y', y + 3);
    lbl.setAttribute('font-family', 'JetBrains Mono, monospace');
    lbl.setAttribute('font-size', '9');
    lbl.setAttribute('fill', '#7A7266');
    lbl.textContent = v;
    svg.appendChild(lbl);
  });

  // Area + line
  if (n > 0) {
    let d = `M ${xs[0]} ${ys[0]}`;
    for (let i=1; i<n; i++) d += ` L ${xs[i]} ${ys[i]}`;
    const line = document.createElementNS(svgNS, 'path');
    line.setAttribute('d', d);
    line.setAttribute('fill', 'none');
    line.setAttribute('stroke', '#1F4743');
    line.setAttribute('stroke-width', '2');
    line.setAttribute('stroke-linecap', 'round');
    line.setAttribute('stroke-linejoin', 'round');
    svg.appendChild(line);

    // Area
    const area = document.createElementNS(svgNS, 'path');
    let ad = `M ${xs[0]} ${H-PAD}`;
    for (let i=0; i<n; i++) ad += ` L ${xs[i]} ${ys[i]}`;
    ad += ` L ${xs[n-1]} ${H-PAD} Z`;
    area.setAttribute('d', ad);
    area.setAttribute('fill', '#1F4743');
    area.setAttribute('opacity', '0.08');
    svg.appendChild(area);

    // Dots
    results.forEach((r, i) => {
      const c = document.createElementNS(svgNS, 'circle');
      c.setAttribute('cx', xs[i]); c.setAttribute('cy', ys[i]);
      c.setAttribute('r', '4');
      c.setAttribute('fill', '#F4EFE6');
      c.setAttribute('stroke', '#1F4743');
      c.setAttribute('stroke-width', '2');
      svg.appendChild(c);

      // Week label
      if (r.week != null) {
        const lbl = document.createElementNS(svgNS, 'text');
        lbl.setAttribute('x', xs[i]); lbl.setAttribute('y', H - 6);
        lbl.setAttribute('text-anchor', 'middle');
        lbl.setAttribute('font-family', 'JetBrains Mono, monospace');
        lbl.setAttribute('font-size', '9');
        lbl.setAttribute('fill', '#7A7266');
        lbl.textContent = `W${r.week}`;
        svg.appendChild(lbl);
      }
    });
  }

  return el('div', { class: 'chart-wrap', style: { marginBottom: '14px' } },
    el('div', { class: 'chart-title' }, 'Score trend'),
    svg
  );
}

function renderTopicSummary(results) {
  // Aggregate correct / total per topic across all weeks
  const agg = {};
  results.forEach(r => {
    (r.results || []).forEach(item => {
      const t = item.topic || 'General';
      if (!agg[t]) agg[t] = { correct: 0, total: 0 };
      agg[t].total++;
      if (item.correct) agg[t].correct++;
    });
  });
  const rows = Object.entries(agg).sort((a,b) => (a[1].correct/a[1].total) - (b[1].correct/b[1].total));
  if (!rows.length) return el('div');

  return el('div', { class: 'card', style: { marginBottom: '14px' } },
    el('div', { class: 'eyebrow muted', style: { marginBottom: '8px' } }, 'Across all weeks, by topic'),
    el('div', { class: 'topic-grid' },
      rows.map(([t, v]) => {
        const p = v.correct / v.total;
        const cls = p < 0.5 ? 'low' : p < 0.8 ? 'mid' : '';
        return el('div', { class: 'topic-row ' + cls },
          el('div', {},
            el('div', { class: 't-name' }, t),
            el('div', { class: 't-bar' }, el('i', { style: { width: (p*100)+'%' } }))
          ),
          el('div', { class: 't-score' }, `${v.correct}/${v.total} · ${Math.round(p*100)}%`)
        );
      })
    )
  );
}

// ─── Import-result landing (from sms link) ────────────────────────────
function viewImportResult(pkg) {
  const v = el('div', { class: 'view' });
  v.appendChild(renderTopbar('Result'));
  const wrap = el('div', { class: 'wrap' });
  v.appendChild(wrap);

  wrap.appendChild(el('span', { class: 'eyebrow' }, 'New result received'));
  wrap.appendChild(el('h2', { class: 'display', style: { marginTop: '10px' } },
    pkg.quizTitle || 'Quiz', el('span', { style: { color: 'var(--no)' } }, '.')
  ));
  wrap.appendChild(el('p', { class: 'lede', style: { marginTop: '10px' } },
    pkg.week ? `Week ${pkg.week} · ` : '', pkg.date
  ));

  wrap.appendChild(el('div', { style: { display: 'flex', alignItems: 'baseline', gap: '14px', marginTop: '18px' } },
    el('div', { class: 'score-big' }, String(pkg.score), el('span', { class: 'over' }, ` / ${pkg.total}`)),
    el('div', { class: 'score-pct' }, `${pkg.percentage}%`)
  ));

  // Breakdown by topic (inline)
  const agg = {};
  (pkg.results || []).forEach(r => {
    const t = r.topic || 'General';
    if (!agg[t]) agg[t] = { correct: 0, total: 0 };
    agg[t].total++;
    if (r.correct) agg[t].correct++;
  });

  wrap.appendChild(el('div', { class: 'card', style: { marginTop: '22px' } },
    el('div', { class: 'eyebrow muted', style: { marginBottom: '12px' } }, 'By topic'),
    el('div', { class: 'topic-grid' },
      Object.entries(agg).map(([t, v]) => {
        const p = v.correct / v.total;
        const cls = p < 0.5 ? 'low' : p < 0.8 ? 'mid' : '';
        return el('div', { class: 'topic-row ' + cls },
          el('div', {},
            el('div', { class: 't-name' }, t),
            el('div', { class: 't-bar' }, el('i', { style: { width: (p*100)+'%' } }))
          ),
          el('div', { class: 't-score' }, `${v.correct}/${v.total}`)
        );
      })
    )
  ));

  const wrong = (pkg.results || []).filter(r => !r.correct);
  if (wrong.length) {
    wrap.appendChild(el('div', { class: 'card', style: { marginTop: '14px' } },
      el('div', { class: 'eyebrow muted', style: { marginBottom: '6px' } }, `Missed — ${wrong.length}`),
      wrong.map(r =>
        el('div', { class: 'review-item' },
          el('div', { class: 'ri-topic' }, r.topic),
          el('div', { class: 'ri-q' }, r.question),
          el('div', { class: 'ri-meta' },
            'She chose: ', el('span', { class: 'chosen' }, r.chosenAnswer || '—'),
            ' · Correct: ', el('span', { class: 'chosen ok' }, r.correctAnswer)
          )
        )
      )
    ));
  }

  // Re-study pointer (if sources travelled along with the result)
  if (pkg.sources && wrong.length) {
    wrap.appendChild(el('div', { class: 'restudy' },
      el('div', { class: 'eyebrow' }, 'Re-study'),
      el('div', { class: 'src' }, pkg.sources)
    ));
  }

  wrap.appendChild(el('div', { style: { marginTop: '22px' } },
    el('button', {
      class: 'btn block lg',
      onclick: () => {
        STORE.results.add(pkg);
        toast('Saved to dashboard');
        setTimeout(() => { location.hash = '#dashboard'; }, 400);
      }
    }, 'Save to dashboard'),
    el('button', {
      class: 'btn ghost block',
      style: { marginTop: '8px' },
      onclick: async () => {
        const ok = await copyText(location.href);
        toast(ok ? 'Link copied' : 'Copy failed');
      }
    }, 'Copy link'),
    el('a', {
      class: 'btn quiet block',
      style: { marginTop: '4px' },
      href: '#'
    }, 'Dismiss')
  ));

  // iOS quirk: PWA (home-screen) and Safari have separate localStorage.
  // If we're not in standalone mode, saving here won't show up in the PWA.
  if (!isStandalone()) {
    wrap.appendChild(el('p', {
      style: {
        marginTop: '18px',
        fontSize: '13px',
        lineHeight: '1.55',
        color: 'var(--ink-3)',
        padding: '12px 14px',
        background: 'var(--bg-sunken)',
        borderRadius: 'var(--r)',
        border: '1px solid var(--line-2)'
      }
    },
      'Heads up: you\'re in Safari right now. If you\'ve added Study to your home screen, ',
      'saving here won\'t show up in the home-screen app (iOS keeps them separate). ',
      'Open the app from your home screen, tap ', el('b', {}, '+ Import result'), ', and paste this link.'
    ));
  }

  return v;
}

// ─── Error view ───────────────────────────────────────────────────────
function viewError(msg) {
  const v = el('div', { class: 'view' });
  v.appendChild(renderTopbar('Error'));
  const wrap = el('div', { class: 'wrap' });
  v.appendChild(wrap);
  wrap.appendChild(el('h2', { class: 'display' }, 'Couldn\'t load this', el('span', { style: { color: 'var(--no)' } }, '.')));
  wrap.appendChild(el('p', { class: 'lede', style: { marginTop: '12px' } }, msg));
  wrap.appendChild(el('a', { href: '#', class: 'btn ghost', style: { marginTop: '20px' } }, 'Go home'));
  return v;
}

// ═══════════════════════════════════════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════════════════════════════════════

function render() {
  const app = $('#app');
  app.innerHTML = '';

  const hash = location.hash.replace(/^#/, '');

  if (!hash || hash === 'home') {
    app.appendChild(viewHome());
    return;
  }
  if (hash === 'create') {
    app.appendChild(viewCreate());
    return;
  }
  if (hash === 'dashboard') {
    app.appendChild(viewDashboard());
    return;
  }
  if (hash.startsWith('q=')) {
    try {
      const pkg = b64decode(hash.slice(2));
      if (!pkg || !Array.isArray(pkg.q)) throw new Error('Malformed quiz data');
      app.appendChild(viewQuiz(pkg));
    } catch (e) {
      app.appendChild(viewError('This quiz link appears to be broken or corrupted. (' + e.message + ')'));
    }
    return;
  }
  if (hash.startsWith('r=')) {
    try {
      const pkg = b64decode(hash.slice(2));
      if (!pkg || !Array.isArray(pkg.results)) throw new Error('Not a results object');
      app.appendChild(viewImportResult(pkg));
    } catch (e) {
      app.appendChild(viewError('This results link appears to be broken. (' + e.message + ')'));
    }
    return;
  }

  app.appendChild(viewHome());
}

window.addEventListener('hashchange', render);
render();

</script>
</body>
</html>
